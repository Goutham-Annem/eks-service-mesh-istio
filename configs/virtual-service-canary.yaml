apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: my-service
  namespace: production
spec:
  hosts:
    - my-service
    - my-service.example.com
  gateways:
    - mesh
    - production-gateway
  http:
    # Header-based routing: canary testers get canary version
    - match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: my-service
            subset: canary
    # Weighted traffic split: 90% stable, 10% canary
    - route:
        - destination:
            host: my-service
            subset: stable
          weight: 90
        - destination:
            host: my-service
            subset: canary
          weight: 10
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: gateway-error,connect-failure,retriable-4xx
      fault:
        # Inject delay for chaos testing (disabled by default - set percentage to 0)
        delay:
          percentage:
            value: 0
          fixedDelay: 500ms
